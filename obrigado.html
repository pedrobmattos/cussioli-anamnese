<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recebido! — Clínica Cussioli</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Instrument+Sans:wght@400;500&family=Spline+Sans+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F5FAF8;--ink:#0F2E2A;--muted:#4E6864;--teal-deep:#0A5C50;--mint:#DFF2EC}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--paper);color:var(--ink);font-family:"Instrument Sans",system-ui,sans-serif;
    text-align:center;padding:24px;
  }
  .box{max-width:480px}
  .check{
    width:74px;height:74px;border-radius:24px;background:var(--mint);color:var(--teal-deep);
    display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 22px;
  }
  h1{font-family:"Bricolage Grotesque",Georgia,serif;font-weight:800;font-size:clamp(1.8rem,7vw,2.6rem);letter-spacing:-.015em;line-height:1.05;margin:0 0 14px}
  h1 em{font-style:normal;color:var(--teal-deep)}
  p{color:var(--muted);margin:0 0 8px;line-height:1.55}
  .mono{font-family:"Spline Sans Mono",ui-monospace,monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-top:26px}
</style>
</head>
<body>
  <div class="box">
    <div class="check">✓</div>
    <h1>Recebido, <em>doutor.</em></h1>
    <p>Suas respostas já chegaram pro Pedro. Ele analisa tudo e traz o diagnóstico na conversa de vocês.</p>
    <p>Lembrou de algo depois? É só mandar no WhatsApp dele.</p>
    <span class="mono">clínica cussioli · anamnese digital</span>
  </div>
</body>
</html>
